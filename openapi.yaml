openapi: 3.0.0
paths:
  /:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      summary: API Information
      tags:
        - info
  /examples:
    get:
      operationId: ExamplesController_findAll
      parameters: []
      responses:
        '200':
          description: Returns paginated examples
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Get all examples with pagination
      tags: &ref_0
        - examples
    post:
      operationId: ExamplesController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExampleDto'
      responses:
        '201':
          description: Example created successfully
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Create a new example
      tags: *ref_0
  /health:
    get:
      operationId: HealthController_check
      parameters: []
      responses:
        '200':
          description: Service is healthy
      summary: Health check endpoint
      tags:
        - health
  /admin/permissions/roles:
    post:
      operationId: PermissionsManagementController_createRole
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleDto'
      responses:
        '201':
          description: Role created successfully
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: &ref_1
        - bearer: []
      summary: Create a new role
      tags: &ref_2
        - admin / permissions
    get:
      operationId: PermissionsManagementController_getAllRoles
      parameters: []
      responses:
        '200':
          description: List of roles
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: List all roles
      tags: *ref_2
  /admin/permissions/roles/{roleId}:
    delete:
      operationId: PermissionsManagementController_deleteRole
      parameters:
        - name: roleId
          required: true
          in: path
          description: Role ID
          schema:
            type: number
      responses:
        '204':
          description: Role deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Delete a role by ID
      tags: *ref_2
  /admin/permissions/table-permissions:
    post:
      operationId: PermissionsManagementController_setTablePermissions
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTablePermissionsDto'
      responses:
        '201':
          description: Permissions set successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Set permissions for a role on a table
      tags: *ref_2
  /admin/permissions/table-permissions/batch:
    post:
      operationId: PermissionsManagementController_batchSetPermissions
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchSetPermissionsDto'
      responses:
        '201':
          description: Permissions set successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Batch-set permissions for a role across multiple tables
      tags: *ref_2
  /admin/permissions/roles/{roleId}/permissions:
    get:
      operationId: PermissionsManagementController_getRolePermissions
      parameters:
        - name: roleId
          required: true
          in: path
          description: Role ID
          schema:
            type: number
      responses:
        '200':
          description: List of table permissions
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Get all table permissions for a role
      tags: *ref_2
    delete:
      operationId: PermissionsManagementController_deleteRolePermissions
      parameters:
        - name: roleId
          required: true
          in: path
          description: Role ID
          schema:
            type: number
      responses:
        '204':
          description: Permissions deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Delete all table permissions for a role
      tags: *ref_2
  /admin/permissions/roles/{sourceRoleId}/copy-to/{targetRoleId}:
    post:
      operationId: PermissionsManagementController_copyPermissions
      parameters:
        - name: sourceRoleId
          required: true
          in: path
          description: Source role ID
          schema:
            type: number
        - name: targetRoleId
          required: true
          in: path
          description: Target role ID
          schema:
            type: number
      responses:
        '201':
          description: Permissions copied successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Copy all permissions from one role to another
      tags: *ref_2
  /admin/permissions/user-roles/assign:
    post:
      operationId: PermissionsManagementController_assignRole
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRoleDto'
      responses:
        '201':
          description: Role assigned successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Assign a single role to a user
      tags: *ref_2
  /admin/permissions/user-roles/assign-multiple:
    post:
      operationId: PermissionsManagementController_assignMultipleRoles
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignMultipleRolesDto'
      responses:
        '201':
          description: Roles assigned successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Assign multiple roles to a user
      tags: *ref_2
  /admin/permissions/user-roles/users/{userId}/roles/{roleId}:
    delete:
      operationId: PermissionsManagementController_removeRole
      parameters:
        - name: userId
          required: true
          in: path
          description: User ID
          schema:
            type: number
        - name: roleId
          required: true
          in: path
          description: Role ID
          schema:
            type: number
      responses:
        '204':
          description: Role removed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Remove a role from a user
      tags: *ref_2
  /admin/permissions/users/{userId}/roles:
    get:
      operationId: PermissionsManagementController_getUserRoles
      parameters:
        - name: userId
          required: true
          in: path
          description: User ID
          schema:
            type: number
      responses:
        '200':
          description: List of user roles
        '401':
          description: Unauthorized
        '403':
          description: Forbidden – insufficient permissions
      security: *ref_1
      summary: Get all roles assigned to a user
      tags: *ref_2
info:
  title: NocoDB Middleware API
  description: >-
    REST API for the NocoDB Middleware – provides JWT-secured access to NocoDB with role-based permissions, caching,
    rate limiting, and distributed tracing.
  version: 0.0.1
  contact: {}
tags: []
servers:
  - url: http://localhost:3000
    description: Local
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CreateExampleDto:
      type: object
      properties:
        title:
          type: string
          description: Title of the example
          example: My Example
      required:
        - title
    CreateRoleDto:
      type: object
      properties:
        roleName:
          type: string
          description: Unique name for the role
          example: editor
          minLength: 3
          maxLength: 50
        description:
          type: string
          description: Optional description of the role
          example: Can edit but not delete records
          maxLength: 255
        isSystemRole:
          type: boolean
          description: Whether this is a built-in system role
          example: false
          default: false
      required:
        - roleName
    SetTablePermissionsDto:
      type: object
      properties:
        roleId:
          type: number
          description: ID of the role to assign permissions to
          example: 1
        tableName:
          type: string
          description: Name of the NocoDB table
          example: Products
          pattern: ^[a-zA-Z0-9_-]+$
        canCreate:
          type: boolean
          description: Allow record creation
          example: true
        canRead:
          type: boolean
          description: Allow record reads
          example: true
        canUpdate:
          type: boolean
          description: Allow record updates
          example: true
        canDelete:
          type: boolean
          description: Allow record deletion
          example: false
      required:
        - roleId
        - tableName
        - canCreate
        - canRead
        - canUpdate
        - canDelete
    TablePermissionItem:
      type: object
      properties:
        tableName:
          type: string
          description: Name of the NocoDB table
          example: Products
          pattern: ^[a-zA-Z0-9_-]+$
        canCreate:
          type: boolean
          description: Allow record creation
          example: true
        canRead:
          type: boolean
          description: Allow record reads
          example: true
        canUpdate:
          type: boolean
          description: Allow record updates
          example: true
        canDelete:
          type: boolean
          description: Allow record deletion
          example: false
      required:
        - tableName
        - canCreate
        - canRead
        - canUpdate
        - canDelete
    BatchSetPermissionsDto:
      type: object
      properties:
        roleId:
          type: number
          description: ID of the role to assign permissions to
          example: 1
        permissions:
          description: Array of table permission objects
          type: array
          items:
            $ref: '#/components/schemas/TablePermissionItem'
      required:
        - roleId
        - permissions
    AssignRoleDto:
      type: object
      properties:
        userId:
          type: number
          description: ID of the user to assign the role to
          example: 42
        roleId:
          type: number
          description: ID of the role to assign
          example: 1
      required:
        - userId
        - roleId
    AssignMultipleRolesDto:
      type: object
      properties:
        userId:
          type: number
          description: ID of the user to assign the roles to
          example: 42
        roleIds:
          description: Array of role IDs to assign
          example:
            - 1
            - 2
            - 3
          type: array
          items:
            type: number
      required:
        - userId
        - roleIds
