version: '3.8'

services:
  nocodb-middleware:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NOCODB_API_URL=http://nocodb:8080
      - NOCODB_API_TOKEN=${NOCODB_API_TOKEN}
      - NOCODB_BOOTSTRAP_ADMIN_USERNAME=${NOCODB_BOOTSTRAP_ADMIN_USERNAME}
      - NOCODB_BASE_ID=${NOCODB_BASE_ID}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1d
      - PORT=3000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - LOG_DIR=/app/logs
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs
    depends_on:
      nocodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nocodb-network
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - '8080:8080'
    environment:
      - NC_DB=sqlite:///data/nocodb.db
    volumes:
      - nocodb-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:8080/api/v1/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nocodb-network
    restart: unless-stopped

networks:
  nocodb-network:
    driver: bridge

volumes:
  nocodb-data:
  middleware-logs:
