version: '3.8'

services:
  nocodb-middleware:
    build: .
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NOCODB_API_URL=http://nocodb:8080
      - NOCODB_API_TOKEN=${NOCODB_API_TOKEN}
      - NOCODB_BOOTSTRAP_ADMIN_USERNAME=${NOCODB_BOOTSTRAP_ADMIN_USERNAME}
      - NOCODB_BASE_ID=${NOCODB_BASE_ID}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1d
      - PORT=3000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - LOG_DIR=/app/logs
      - LOG_LEVEL=info
      # Redis configuration (optional, enable for distributed caching)
      - REDIS_ENABLED=${REDIS_ENABLED:-false}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - CACHE_TTL=${CACHE_TTL:-60}
    volumes:
      - ./logs:/app/logs
    depends_on:
      nocodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nocodb-network
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - '8080:8080'
    environment:
      - NC_DB=sqlite:///data/nocodb.db
    volumes:
      - nocodb-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nocodb-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - nocodb-network
    restart: unless-stopped

networks:
  nocodb-network:
    driver: bridge

volumes:
  nocodb-data:
  redis-data:
  middleware-logs:
