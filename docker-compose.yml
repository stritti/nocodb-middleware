version: '3.8'

services:
  nocodb-middleware:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NOCODB_API_URL=http://nocodb:8080
      - NOCODB_API_TOKEN=${NOCODB_API_TOKEN}
      - NOCODB_BOOTSTRAP_ADMIN_USERNAME=${NOCODB_BOOTSTRAP_ADMIN_USERNAME}
      - NOCODB_BASE_ID=${NOCODB_BASE_ID}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=1d
      - PORT=3000
    depends_on:
      - nocodb
    networks:
      - nocodb-network

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "8080:8080"
    environment:
      - NC_DB=sqlite:///data/nocodb.db
    volumes:
      - nocodb-data:/data
    networks:
      - nocodb-network

networks:
  nocodb-network:
    driver: bridge

volumes:
  nocodb-data:
