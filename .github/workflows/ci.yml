name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Unit & Integration Tests
      run: npm run test

    - name: Run Test Coverage
      run: npm run test:cov

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 14

    - name: Code Coverage Summary
      run: |
        echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "See uploaded artifact for full details." >> $GITHUB_STEP_SUMMARY
        # Simple extraction of the summary line from the console output would require piping, 
        # but for now we rely on the user downloading the artifact or checking logs.
