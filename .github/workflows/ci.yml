name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: '22'

jobs:
  quality:
    name: Code Quality (lint + format + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build check
        run: npm run build

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: npm run test:cov

      - name: Enforce Coverage Threshold
        run: |
          node -e "
            const data = require('./coverage/coverage-summary.json');
            const t = data.total;
            const THRESHOLDS = { lines: 80, statements: 80, functions: 80, branches: 70 };
            let failures = [];
            for (const [key, threshold] of Object.entries(THRESHOLDS)) {
              const actual = t[key].pct;
              if (actual < threshold) {
                failures.push(\`  ❌ \${key}: \${actual}% < \${threshold}%\`);
              }
            }
            if (failures.length > 0) {
              console.error('Coverage thresholds not met:');
              failures.forEach(f => console.error(f));
              process.exit(1);
            }
            console.log('✅ All coverage thresholds met');
          "

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage Summary (Job Summary)
        run: |
          echo "## 📊 Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = data.total;
            const emoji = (pct) => pct >= 80 ? '✅' : pct >= 60 ? '⚠️' : '❌';
            const rows = [
              '| Metric | Coverage | Covered | Total | Threshold |',
              '|--------|:--------:|--------:|------:|:---------:|',
              \`| \${emoji(t.statements.pct)} Statements | \${t.statements.pct}% | \${t.statements.covered} | \${t.statements.total} | ≥ 80% |\`,
              \`| \${emoji(t.branches.pct)} Branches | \${t.branches.pct}% | \${t.branches.covered} | \${t.branches.total} | ≥ 70% |\`,
              \`| \${emoji(t.functions.pct)} Functions | \${t.functions.pct}% | \${t.functions.covered} | \${t.functions.total} | ≥ 80% |\`,
              \`| \${emoji(t.lines.pct)} Lines | \${t.lines.pct}% | \${t.lines.covered} | \${t.lines.total} | ≥ 80% |\`,
            ];
            rows.forEach(r => console.log(r));
          " >> $GITHUB_STEP_SUMMARY

      - name: Post Coverage Comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const t = coverage.total;
            const emoji = (pct) => pct >= 80 ? '✅' : pct >= 60 ? '⚠️' : '❌';
            const row = (name, d) =>
              `| ${emoji(d.pct)} **${name}** | ${d.pct}% | ${d.covered}/${d.total} |`;

            const marker = '<!-- coverage-report -->';
            const body = [
              marker,
              '## 📊 Code Coverage Report',
              '',
              '| Metric | Coverage | Covered / Total |',
              '|--------|:--------:|----------------:|',
              row('Statements', t.statements),
              row('Branches',   t.branches),
              row('Functions',  t.functions),
              row('Lines',      t.lines),
              '',
              '> ✅ ≥ 80%&nbsp;&nbsp;⚠️ 60–79%&nbsp;&nbsp;❌ < 60%',
              '',
              `_Updated: ${new Date().toISOString()}_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Generate Coverage Badge SVG
        run: node scripts/generate-badge.js

      - name: Commit Badge to badges Branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin badges:refs/remotes/origin/badges 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/badges; then
            git worktree add -B badges /tmp/badges-branch origin/badges
          else
            git worktree add --orphan -b badges /tmp/badges-branch
          fi

          cp .badges/coverage.svg /tmp/badges-branch/coverage.svg

          cd /tmp/badges-branch
          git add coverage.svg
          if git diff --cached --quiet; then
            echo "Badge unchanged – nothing to commit."
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push origin HEAD:badges
          fi
