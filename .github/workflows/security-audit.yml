name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1' # Jeden Montag um 3 Uhr UTC

jobs:
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      # 1. Checkout des Repositories
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js Umgebung einrichten
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Abhängigkeiten installieren
      - name: Install dependencies
        run: npm ci

      # 4. Snyk Security Scan (Abhängigkeiten, Code, Container)
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json
          command: test

      # 5. Snyk Monitor (für kontinuierliche Überwachung, optional)
      - name: Monitor with Snyk
        if: always()
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

      # 6. Trivy Scan (Container- und Dateisystem-Scans)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # 7. CodeQL Analysis (Statische Code-Analyse)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 8. Ergebnisse hochladen
      - name: Upload Snyk results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            snyk-results.json
            trivy-results.sarif

      # 9. Security Events in GitHub hochladen (für Dependabot)
      - name: Upload security events to GitHub
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const snykResults = JSON.parse(fs.readFileSync('snyk-results.json', 'utf8'));
            const vulnerabilities = snykResults.vulnerabilities || [];
            if (vulnerabilities.length > 0) {
              console.log(`Found ${vulnerabilities.length} vulnerabilities.`);
            }
