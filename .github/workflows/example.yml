name: Example CI

on:
  pull_request:
    paths:
      - 'example/**'
      - '.github/workflows/example.yml'
  push:
    branches: [main]
    paths:
      - 'example/**'
      - '.github/workflows/example.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE26: true
  NODE_VERSION: '24'

jobs:
  backend:
    name: Backend (TypeScript + Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        run: npm ci || npm install

      - name: TypeScript type check
        run: npx tsc --noEmit --pretty

      - name: Build
        run: |
          if [ -f nest-cli.json ]; then
            npm run build
          else
            echo "No nest-cli.json — using tsc directly"
            npx tsc --project tsconfig.json --outDir dist --pretty
          fi

  frontend:
    name: Frontend (Vite Build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: npm ci || npm install

      - name: TypeScript type check
        run: npx vue-tsc --noEmit 2>/dev/null || echo "vue-tsc not available — skipping type check"

      - name: Build frontend
        run: npm run build

  openapi:
    name: OpenAPI Spec Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenAPI example spec
        run: |
          if [ -f example/openapi-example.yaml ]; then
            echo "Validating OpenAPI spec..."
            npx --yes @apidevtools/swagger-cli validate example/openapi-example.yaml
          else
            echo "⚠️ No OpenAPI example spec found — skipping"
          fi
