name: Stale Issue Management

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ── Issues ──────────────────────────────────────────────────────
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed if no further activity occurs
            within 7 days. Thank you for your contributions.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. Feel
            free to reopen it if the problem persists or is still relevant.
          stale-issue-label: 'status/stale'
          exempt-issue-labels: 'status/confirmed,status/in-progress,security,enhancement'
          days-before-issue-stale: 60
          days-before-issue-close: 7

          # ── Pull Requests ───────────────────────────────────────────────
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed if no further
            activity occurs within 7 days.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Feel free to reopen it if you intend to continue working on it.
          stale-pr-label: 'status/stale'
          exempt-pr-labels: 'status/in-progress,security,dependencies'
          days-before-pr-stale: 30
          days-before-pr-close: 7

          # ── General ─────────────────────────────────────────────────────
          operations-per-run: 100
          ascending: true
          delete-branch: true
