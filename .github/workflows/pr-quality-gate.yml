name: PR Quality Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-quality-gates:
    name: Verify PR Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Lint
        id: lint
        run: |
          if npm run lint; then
            echo "lint_passed=true" >> $GITHUB_OUTPUT
          else
            echo "lint_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Format Check
        id: format
        run: |
          if npm run format:check; then
            echo "format_passed=true" >> $GITHUB_OUTPUT
          else
            echo "format_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Build
        id: build
        run: |
          if npm run build; then
            echo "build_passed=true" >> $GITHUB_OUTPUT
          else
            echo "build_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Tests
        id: tests
        run: |
          if npm run test; then
            echo "tests_passed=true" >> $GITHUB_OUTPUT
          else
            echo "tests_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Coverage Check
        id: coverage
        run: |
          if npm run test:cov; then
            echo "coverage_passed=true" >> $GITHUB_OUTPUT
          else
            echo "coverage_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check OpenAPI Spec Diff
        id: openapi
        run: |
          # Generate OpenAPI spec
          npm run generate:openapi
          
          # Check if there are any diffs in the generated spec
          if [ -f openapi.json ]; then
            # Get the diff between current and generated spec
            DIFF_OUTPUT=$(git diff --no-index -- openapi.json openapi.json 2>/dev/null || echo "")
            if [ -z "$DIFF_OUTPUT" ]; then
              echo "openapi_passed=true" >> $GITHUB_OUTPUT
            else
              echo "openapi_passed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "openapi_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check npm Audit
        id: audit
        run: |
          if npm audit --production; then
            echo "audit_passed=true" >> $GITHUB_OUTPUT
          else
            echo "audit_passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect Results
        id: results
        run: |
          # Collect all results
          LINT=${{ steps.lint.outputs.lint_passed }}
          FORMAT=${{ steps.format.outputs.format_passed }}
          BUILD=${{ steps.build.outputs.build_passed }}
          TESTS=${{ steps.tests.outputs.tests_passed }}
          COVERAGE=${{ steps.coverage.outputs.coverage_passed }}
          OPENAPI=${{ steps.openapi.outputs.openapi_passed }}
          AUDIT=${{ steps.audit.outputs.audit_passed }}

          # Count failures (use string comparison)
          FAILURES=0
          [ "$LINT" != "true" ] && FAILURES=$((FAILURES + 1))
          [ "$FORMAT" != "true" ] && FAILURES=$((FAILURES + 1))
          [ "$BUILD" != "true" ] && FAILURES=$((FAILURES + 1))
          [ "$TESTS" != "true" ] && FAILURES=$((FAILURES + 1))
          [ "$COVERAGE" != "true" ] && FAILURES=$((FAILURES + 1))
          [ "$OPENAPI" != "true" ] && FAILURES=$((FAILURES + 1))

          echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          echo "lint=$LINT" >> $GITHUB_OUTPUT
          echo "format=$FORMAT" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "tests=$TESTS" >> $GITHUB_OUTPUT
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "openapi=$OPENAPI" >> $GITHUB_OUTPUT
          echo "audit=$AUDIT" >> $GITHUB_OUTPUT

      - name: Post Quality Gate Comment
        if: always() && github.token != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- pr-quality-gate -->';
            const failures = ${{ steps.results.outputs.failures }};
            const lint = ${{ steps.results.outputs.lint }} === 'true';
            const format = ${{ steps.results.outputs.format }} === 'true';
            const build = ${{ steps.results.outputs.build }} === 'true';
            const tests = ${{ steps.results.outputs.tests }} === 'true';
            const coverage = ${{ steps.results.outputs.coverage }} === 'true';
            const openapi = ${{ steps.results.outputs.openapi }} === 'true';
            const audit = ${{ steps.results.outputs.audit }} === 'true';

            const emoji = (passed) => passed ? '✅' : '❌';
            const status = failures === 0 ? '✅ **ALL QUALITY GATES PASSED**' : '❌ **SOME QUALITY GATES FAILED**';

            const body = [
              marker,
              '## 🚀 PR Quality Gate Report',
              '',
              status,
              '',
              '| Gate | Status |',
              '|------|--------|',
              `| CI Checks | ✅ (checked by GitHub Actions) |`,
              `| Lint | ${emoji(lint)} |`,
              `| Format | ${emoji(format)} |`,
              `| Build | ${emoji(build)} |`,
              `| Tests | ${emoji(tests)} |`,
              `| Coverage | ${emoji(coverage)} |`,
              `| OpenAPI | ${emoji(openapi)} |`,
              `| npm Audit | ${emoji(audit)} |`,
              '',
              failures === 0 ?
                '🎉 This PR is ready for review!' :
                '⚠️ Please fix the failed quality gates before marking as ready for review.',
              '',
              `_Updated: ${new Date().toISOString()}_`,
            ].join('\n');

            // Find existing comment
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if Quality Gates not met
        if: steps.results.outputs.failures != 0
        run: |
          echo "❌ Quality Gates failed!"
          echo "Please fix the issues before marking this PR as ready for review."
          exit 1
